name: Release

on:
  workflow_dispatch: # Manual trigger for releases
    inputs:
      release_version:
        description: "Release version, e.g. 3.3.0-M1. Blank = strip -SNAPSHOT from gradle.properties."
        required: false
      next_version:
        description: "Next dev version, e.g. 3.3.0-SNAPSHOT. Blank = bump patch. Set to the milestone target for an M-release."
        required: false

permissions:
  contents: write   # push the release commit, tag, and snapshot bump
  actions: write    # dispatch the build/publish workflow on the new tag

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read and Process Version
        id: process_version
        run: |
          VERSION=$(grep "^version=" gradle.properties | sed 's/^version=//')

          # Release version: explicit input wins; otherwise strip -SNAPSHOT.
          RELEASE_VERSION="${{ github.event.inputs.release_version }}"
          if [ -z "$RELEASE_VERSION" ]; then
            RELEASE_VERSION=$(echo "$VERSION" | sed 's/-SNAPSHOT//')
          fi

          # Next dev version: explicit input wins; otherwise bump patch off the
          # current SNAPSHOT base (so a milestone can stay on its target version).
          NEXT_VERSION="${{ github.event.inputs.next_version }}"
          if [ -z "$NEXT_VERSION" ]; then
            DEV_VERSION=$(echo "$VERSION" | sed 's/-SNAPSHOT//')
            BASE_VERSION=$(echo "$DEV_VERSION" | awk -F '.' '{print $1"."$2}')
            PATCH_VERSION=$(echo "$DEV_VERSION" | awk -F '.' '{print $3+1}')
            NEXT_VERSION="$BASE_VERSION.$PATCH_VERSION-SNAPSHOT"
          fi

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV

      - name: Commit and Tag Release Version
        run: |
          sed -i "s/^version=.*/version=${RELEASE_VERSION}/" gradle.properties
          git add gradle.properties
          git commit -m "build(release): ${RELEASE_VERSION}"
          git tag -a "${RELEASE_VERSION}" -m "Release version ${RELEASE_VERSION}"
          git push origin HEAD
          git push origin "${RELEASE_VERSION}"

      - name: Trigger Build and Publish Workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_VERSION;
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'gradle.yml',
              ref: tag,
              inputs: {}
            });
            console.log(`Triggered Build and Publish workflow on tag ${tag}`);

      - name: Increment to Next Snapshot Version
        run: |
          sed -i "s/^version=.*/version=${NEXT_VERSION}/" gradle.properties
          git add gradle.properties
          git commit -m "build(release): start ${NEXT_VERSION}"
          git push origin HEAD
