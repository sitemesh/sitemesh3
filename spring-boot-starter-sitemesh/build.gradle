plugins {
    id 'java-library'
}

ext.title = 'SiteMesh Spring Boot Starter'
description = 'SiteMesh Spring Boot Starter'

dependencies {
    api project(':sitemesh')
    api 'org.springframework.boot:spring-boot-starter-web:4.1.0'
    implementation project(':spring-webmvc-sitemesh')

    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor:4.1.0'

    testImplementation 'junit:junit:4.13.2'
}

// Make the manually maintained META-INF/additional-spring-configuration-metadata.json
// visible to the configuration processor (see Spring Boot's configuration metadata docs).
tasks.named('compileJava') {
    inputs.files(tasks.named('processResources'))
}