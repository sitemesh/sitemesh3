spring:
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp
  freemarker:
    suffix: .ftl
sitemesh:
  # view-resolver integration is the default; uncomment to switch to the
  # classic servlet filter (decorates static .html and non-MVC content too,
  # but is subject to Tomcat 11 forward/unwrap issues - see DispatchMode).
  # integration: filter
  decorator:
    metaTag: decorator
#    tagRuleBundles: org.sitemesh.content.tagrules.html.Sm2TagRuleBundle
    exclusions: /assets/*
    mappings:
      - path: /*
        decorator: default.html
server:
  error:
    include-binding-errors: always
    include-exception: true
    include-message: always
    include-stacktrace: always
#    whitelabel:
#      enabled: false
