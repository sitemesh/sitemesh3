<!DOCTYPE html>
<html>
  <head>
    <title>Meta-tag override</title>
    <meta name="decorator" content="decorators/alternative">
  </head>
  <body>
    <p>This page selects its own decorator with
       <code>&lt;meta name="decorator" content="decorators/alternative"&gt;</code>.</p>
    <p><a href="/">Back to the default decorator</a>.</p>
  </body>
</html>
